<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form class="weatherForm">
        <input type="text" class="cityInput" placeholder="Type your city name here.">
        <button type="submit">Get Weather</button>
    </form>

    <div class="card">
        <h1 class="cityDisplay">Curitiba</h1>
        <p class="tempDisplay">21°C</p>
        <p class="humidity">Humidity: 70%</p>
        <p class="descDisplay">Clear Skies</p>
        <p class="weatherEmoji">☁</p>
    </div>
</body>
</html>
